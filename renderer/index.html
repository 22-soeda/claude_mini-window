<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Claude</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- タイトルバー -->
    <div id="titlebar">
      <span id="title">
        <span id="title-dot"></span>
        Claude
      </span>
      <div id="controls">
        <!-- 新しい会話 -->
        <button id="btn-new" title="新しい会話">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
        </button>
        <!-- 最小化 -->
        <button id="btn-min" title="最小化">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <!-- 最大化 / 元に戻す -->
        <button id="btn-max" title="最大化">
          <svg id="icon-maximize" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          <svg id="icon-restore"  viewBox="0 0 24 24" style="display:none"><rect x="7" y="4" width="13" height="13" rx="1.5"/><path d="M4 7v10a3 3 0 0 0 3 3h10"/></svg>
        </button>
        <!-- 閉じる -->
        <button id="btn-close" title="閉じる">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- 会話履歴 -->
    <div id="chat-area">
      <div id="messages"></div>
    </div>

    <!-- 入力エリア -->
    <div id="input-area">
      <textarea
        id="input"
        placeholder="メッセージを入力… (Enter で送信 / Shift+Enter で改行)"
        rows="1"
      ></textarea>
      <!-- 送信ボタン (矢印アイコン) -->
      <button id="btn-send" title="送信">
        <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>

  </div>
  <script src="../node_modules/marked/lib/marked.umd.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
